name: wallupi
description: AI-powered fraud detection payment app

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  fl_chart: ^0.65.0
  google_fonts: ^6.1.0
  mobile_scanner: ^3.5.5
  image_picker: ^1.0.4
  intl: ^0.19.0
  animations: ^2.0.8
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.5

# ── Launcher icon config ───────────────────────────────────────────
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  # Adaptive icon (Android 8+): dark background, logo centred as foreground
  adaptive_icon_background: "#121315"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21
  web:
    generate: false

# ── Splash screen config ───────────────────────────────────────────
flutter_native_splash:
  # Match the app's background colour exactly
  color: "#121315"
  image: assets/images/logo.png
  # Logo fills ~1/3 of the screen width (330px on a 1080px device)
  android_12:
    color: "#121315"
    image: assets/images/logo.png
    icon_background_color: "#121315"
  android: true
  ios: false
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
